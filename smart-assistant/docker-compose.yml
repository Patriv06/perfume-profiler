version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smart-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_password
      POSTGRES_DB: smart_assistant
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-assistant-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://smart_user:smart_password@db:5432/smart_assistant
      - TIENDANUBE_CLIENT_ID=${TIENDANUBE_CLIENT_ID:-}
      - TIENDANUBE_CLIENT_SECRET=${TIENDANUBE_CLIENT_SECRET:-}
      - TIENDANUBE_APP_NAME=${TIENDANUBE_APP_NAME:-SmartShoppingAssistant}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-assistant-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
